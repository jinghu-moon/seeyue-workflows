schema_kind: persona_bindings
schema_version: 1
schema_dialect: seeyue_workflow_schema/v1
status: draft
owner: seeyue-workflows
meta:
  purpose: Bind isolated personas to abstract workflow capabilities.
  authority: machine_source_of_truth
  source_documents:
    - docs/architecture-v4.md
    - workflow/router.spec.yaml
    - workflow/capabilities.yaml
  rules:
    - Persona contracts MUST stay capability-scoped.
    - Reviewer personas MUST remain logically isolated from the author persona.
personas:
  planner:
    class: planner
    allowed_capabilities:
      - missing_planning
    may_write_files: false
    may_run_commands: false
    input_contract:
      - task_definition
    output_contract:
      - phase_plan
  author:
    class: implementation
    allowed_capabilities:
      - code_edit
    may_write_files: true
    may_run_commands: true
    input_contract:
      - active_node
    output_contract:
      - changed_files
  spec_reviewer:
    class: review
    allowed_capabilities:
      - spec_review
    may_write_files: false
    may_run_commands: true
    input_contract:
      - active_node
    output_contract:
      - spec_review_verdict
  quality_reviewer:
    class: review
    allowed_capabilities:
      - quality_review
    may_write_files: false
    may_run_commands: true
    input_contract:
      - active_node
    output_contract:
      - quality_review_verdict
  reader:
    class: analysis
    allowed_capabilities:
      - analysis
    may_write_files: false
    may_run_commands: true
    input_contract:
      - research_question
    output_contract:
      - analysis_capsule
  auditor:
    class: analysis
    allowed_capabilities:
      - analysis
    may_write_files: false
    may_run_commands: true
    input_contract:
      - claim_set
    output_contract:
      - audit_verdict
  human:
    class: approval
    allowed_capabilities:
      - human_approval
    may_write_files: false
    may_run_commands: false
    input_contract:
      - approval_request
    output_contract:
      - approval_decision
review_chain:
  - author
  - spec_reviewer
  - quality_reviewer
isolation_rules:
  - Spec reviewer MUST NOT be the same invocation as author.
