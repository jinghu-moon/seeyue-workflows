schema_kind: file_class_registry
schema_version: 1
schema_dialect: seeyue_workflow_schema/v1
status: draft
owner: seeyue-workflows
meta:
  purpose: Define file classes consumed by hooks, policy, and approval routing.
  authority: machine_source_of_truth
  source_documents:
    - docs/architecture-v4.md
    - workflow/policy.spec.yaml
  rules:
    - File classes MUST remain stable identifiers for policy and hook evaluation.
    - Match precedence MUST be deterministic.
classes:
  workspace_file:
    default_risk_class: low
    patterns:
      - src/**/*
  docs_file:
    default_risk_class: low
    patterns:
      - docs/**/*.md
  test_file:
    default_risk_class: low
    patterns:
      - tests/**/*
  generated_file:
    default_risk_class: medium
    patterns:
      - dist/**/*
  system_file:
    default_risk_class: critical
    patterns:
      - .git/**/*
  security_boundary:
    default_risk_class: critical
    patterns:
      - scripts/hooks/**/*
  secret_material:
    default_risk_class: critical
    patterns:
      - .env
match_precedence:
  - secret_material
  - security_boundary
  - system_file
  - generated_file
  - test_file
  - docs_file
  - workspace_file
