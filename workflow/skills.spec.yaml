schema_kind: skills_spec
schema_version: 1
schema_dialect: seeyue_workflow_schema/v1
status: frozen
owner: seeyue-workflows
meta:
  purpose: Define the V5 skill registry, triggers, and policy metadata.
  authority: machine_source_of_truth
  primary_consumers:
  - adapters
  - validators
  - runtime
  source_documents:
  - docs/architecture-v5-proposal.md
  - docs/implementation-plan-v5.md
  rules:
  - Skills MUST reference instruction files and must not inline bodies.
  - output_templates MUST reference ids from workflow/output-templates.spec.yaml.
registry:
  revision: "2026-03-11"
  spec_hash: pending
  change_detection:
    strategy: registry_hash
    manifest_file: .ai/workflow/skills-manifest.json
skill_tiers:
  core:
    description: Required for workflow execution
    enforcement: strict
    load_mode: always
  auxiliary:
    description: Optional enhancement skills
    enforcement: soft
    load_mode: on_demand
tier_enforcement: strict
defaults:
  phases:
  - plan
  - execute
  - review
  triggers:
    mode: explicit
    keywords: []
  arguments:
    schema:
      type: object
      additional_properties: true
    argument_hints: []
  policy:
    disable_model_invocation: false
    allowed_tools: []
  output_templates:
  - status-indicator
skills:
  sy-changelog:
    title: Change Log Management
    summary: Record, merge, and review structured changelog entries.
    category: workflow
    tier: auxiliary
    entry: .agents/skills/sy-changelog/SKILL.md
    capabilities:
    - code_edit
    phases:
    - execute
    triggers:
      mode: explicit
      keywords:
      - sy-changelog
      - changelog
    output_templates:
    - completion-summary
  sy-code-insight:
    title: Code Insight
    summary: Build codebase understanding artifacts before planning or execution.
    category: analysis
    tier: auxiliary
    entry: .agents/skills/sy-code-insight/SKILL.md
