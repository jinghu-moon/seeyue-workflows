name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node tests/hooks/sy-hooks-smoke.cjs
      - run: node tests/skill-triggering/run-all.cjs --mode local --cases tests/skill-triggering/cases.json
      - run: node tests/skill-triggering/run-all.cjs --mode local --cases tests/skill-triggering/cases.constraints.json
